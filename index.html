<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentru Tine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050505; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>
    <script>
        window.addEventListener('load', () => {
            const canvas = document.getElementById('heartCanvas');
            const ctx = canvas.getContext('2d');
            function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            const textToDisplay = "I Love You";
            const totalTexts = 180; // Mult mai multe texte pentru o formă perfectă și plină
            let pulseTime = 0;

            function getHeartPoint(t) {
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                return { x: x, y: -y };
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                pulseTime += 0.04;
                const pulseFactor = 1 + Math.sin(pulseTime) * 0.06;
                const scale = Math.min(canvas.width, canvas.height) * 0.012 * pulseFactor; 

                ctx.font = bold ${Math.max(10, scale * 1.2)}px sans-serif;
                ctx.fillStyle = "#ff5e84"; // Roz-roșiatic intens, foarte romantic
                ctx.shadowBlur = 25; // Efect puternic de neon / glow
                ctx.shadowColor = "#ff2a5f";

                for (let i = 0; i < totalTexts; i++) {
                    let t = (i / totalTexts) * Math.PI * 2;
                    let point = getHeartPoint(t);
                    let posX = centerX + point.x * scale;
                    let posY = centerY + point.y * scale;
                    ctx.save();
                    ctx.translate(posX, posY);
                    let angle = t + Math.PI / 2;
                    ctx.rotate(angle);
                    ctx.fillText(textToDisplay, 0, 0);
                    ctx.restore();
                }
                requestAnimationFrame(animate);
            }
            animate();
        });
    </script>
</body>
</html>
